# version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
       condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:15
    container_name: analytics-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "55342:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  redis:
    image: redis:7
    container_name: analytics-redis
    ports:
      - "6380:6379"

  ingestion-service:
    build:
      context: .
      dockerfile: ingestion-service/Dockerfile

    env_file:
      - .env

    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092  # force override

    ports:
      - "8000:8000"
  consumer-service:
    build:
      context: .
      dockerfile: consumer-service/Dockerfile

    env_file:
      - .env

    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    depends_on:
      kafka:
       condition: service_healthy

    volumes:
      - ./consumer-service:/app
  spark-processing:
    build:
      context: .
      dockerfile: spark_processing/Dockerfile
    env_file:
      - .env
    depends_on:
      - kafka
      - postgres
    volumes:
      - ./consumer-service/raw_events:/app/raw_events
      - ./consumer-service/processed_events:/app/processed_events

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

    ports:
      - "8001:8001"

volumes:
  postgres_data:
